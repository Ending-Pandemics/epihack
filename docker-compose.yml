version: "3.9"

services:
  backend:
    env_file: .env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: epidemic_radar_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./backend:/app
    networks:
      - epidemic_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: epidemic_radar_web
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - epidemic_net

networks:
  epidemic_net:
    driver: bridge
