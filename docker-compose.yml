version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: epidemic_radar_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: epidemic_radar
    volumes:
      - mongo_data:/data/db
      - ./infra/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - epidemic_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: epidemic_radar_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-secret}@mongodb:27017/epidemic_radar?authSource=admin
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    networks:
      - epidemic_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: epidemic_radar_web
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - epidemic_net

volumes:
  mongo_data:

networks:
  epidemic_net:
    driver: bridge
